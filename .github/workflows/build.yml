name: Build TikDown APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Dùng Flutter 3.19.6 → đi kèm Dart 3.3.x, tương thích tất cả packages
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Flutter version check
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK Debug
        run: flutter build apk --debug

      - name: Build APK Release (split by ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TikDown-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release arm64 (dien thoai moi)
        uses: actions/upload-artifact@v4
        with:
          name: TikDown-release-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 90

      - name: Upload Release arm32 (dien thoai cu)
        uses: actions/upload-artifact@v4
        with:
          name: TikDown-release-arm32
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 90

      - name: Create GitHub Release (khi push tag vd v2.0)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          name: TikDown ${{ github.ref_name }}
