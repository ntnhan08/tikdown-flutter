name: tikdown
description: TikDown - Tai video nhanh chong va de dang
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # WebView - dùng ^6.0.0 tương thích Dart 3.4.x
  flutter_inappwebview: ^6.0.0

  # Kiểm tra mạng
  connectivity_plus: ^5.0.2

  # Quyền hạn
  permission_handler: ^11.3.1

  # Download file
  dio: ^5.4.3

  # Đường dẫn file
  path_provider: ^2.1.3

  # Mở link ngoài
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
